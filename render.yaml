# Render Blueprint for Vijayavipanchi — Cultural Music & Lyrics Portal
# Two web services (Express API + Next.js frontend) on Render's free tier.
# Docs: https://render.com/docs/blueprint-spec
#
# Prerequisites (see RENDER_DEPLOY.md for the full walkthrough):
#   • A MongoDB Atlas free (M0) cluster  -> MONGODB_URI
#   • A Cloudinary account (free tier)    -> CLOUDINARY_* (persists uploaded media)
#
# Values marked `sync: false` are NOT stored in git — set them in the Render
# dashboard when prompted while creating the Blueprint.

services:
  # ----------------------------- Backend API (Express) -----------------------------
  - type: web
    name: vijayavipanchi-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the app binds to it.
      - key: MONGODB_URI
        sync: false # Atlas SRV string, include the db name, e.g. ...mongodb.net/swara?retryWrites=true&w=majority
      - key: JWT_SECRET
        generateValue: true
      - key: CAPTCHA_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGIN
        sync: false # the frontend URL, e.g. https://vijayavipanchi-web.onrender.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false # choose a strong password (used to create the first admin on seed)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DATA_DIR
        value: /tmp/vijayavipanchi-data
      - key: LOG_DIR
        value: /tmp/vijayavipanchi-logs
      # Optional — admin "reply by email" works only when SMTP is configured.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # ----------------------------- Frontend (Next.js) --------------------------------
  - type: web
    name: vijayavipanchi-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      # Both point at the backend service's public URL. The Next server proxies
      # /api and /media to it (browser stays same-origin so cookies + CSRF work).
      - key: API_PROXY_TARGET
        sync: false # e.g. https://vijayavipanchi-api.onrender.com
      - key: API_INTERNAL_URL
        sync: false # same backend URL (used for server-side rendering fetches)
